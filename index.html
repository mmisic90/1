<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Business Ideas</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #f5f0ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 16px) env(safe-area-inset-bottom, 16px) env(safe-area-inset-left, 16px);
    }

    .wrapper {
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #1a1a2e;
      text-align: center;
      letter-spacing: -0.5px;
    }

    /* Step indicator */
    .steps-indicator {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
      justify-content: center;
    }

    .step-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #e0d4ff;
      color: #9b6dff;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, color 0.3s, transform 0.3s;
      cursor: pointer;
      flex-shrink: 0;
    }

    .step-dot.active {
      background: #7b2ff7;
      color: #ffffff;
      transform: scale(1.15);
      box-shadow: 0 4px 12px rgba(123, 47, 247, 0.4);
    }

    .step-dot.done {
      background: #c4a7ff;
      color: #ffffff;
    }

    .step-line {
      height: 3px;
      flex: 1;
      max-width: 48px;
      background: #e0d4ff;
      border-radius: 2px;
      transition: background 0.3s;
    }

    .step-line.done {
      background: #c4a7ff;
    }

    /* Card */
    .card-container {
      width: 100%;
      perspective: 800px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(123, 47, 247, 0.12);
      display: none;
      flex-direction: column;
      gap: 16px;
      animation: slideIn 0.35s cubic-bezier(0.34, 1.26, 0.64, 1);
    }

    .card.active {
      display: flex;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .card-number {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #7b2ff7, #a855f7);
      color: #ffffff;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(123, 47, 247, 0.35);
    }

    .card-label {
      font-size: 12px;
      font-weight: 600;
      color: #9b6dff;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1.25;
      margin-top: 2px;
    }

    .card-divider {
      height: 1px;
      background: #f0e8ff;
      border-radius: 1px;
    }

    .card-body {
      font-size: 16px;
      color: #4a4a5a;
      line-height: 1.65;
    }

    .card-tag {
      align-self: flex-start;
      background: #f3ecff;
      color: #7b2ff7;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
    }

    /* Navigation */
    .nav {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      -webkit-appearance: none;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-prev {
      background: #f0e8ff;
      color: #7b2ff7;
    }

    .btn-prev:disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .btn-next {
      background: linear-gradient(135deg, #7b2ff7, #a855f7);
      color: #ffffff;
      box-shadow: 0 4px 16px rgba(123, 47, 247, 0.35);
    }

    .btn-next:active {
      box-shadow: 0 2px 8px rgba(123, 47, 247, 0.25);
    }

    /* Counter */
    .counter {
      font-size: 13px;
      color: #9b6dff;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Business Ideas</h1>

    <!-- Step indicators -->
    <div class="steps-indicator" id="stepsIndicator"></div>

    <!-- Cards -->
    <div class="card-container" id="cardContainer"></div>

    <!-- Navigation -->
    <div class="nav">
      <button class="btn btn-prev" id="btnPrev" disabled>← Back</button>
      <button class="btn btn-next" id="btnNext">Next →</button>
    </div>

    <div class="counter" id="counter"></div>
  </div>

  <script type="module">
    import ideas from './src/ideas.js';
    import { createCarousel } from './src/carousel.js';

    const carousel = createCarousel(ideas, document);

    document.getElementById('btnPrev').onclick = () => carousel.changeStep(-1);
    document.getElementById('btnNext').onclick = () => carousel.changeStep(1);
  </script>
</body>
</html>
