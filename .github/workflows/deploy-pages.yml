name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/create-claude-docs-pcOyU
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      # Objavljuje SAMO sajt — nikad ceo repo (pravni dokumenti i skillovi ne smeju na javni Pages)
      - name: Pripremi dist samo sa sajtom
        run: |
          mkdir dist
          cp index.html remote.html dist/
          cp -r src dist/src
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
